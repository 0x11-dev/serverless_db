name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  typescript:
    name: TypeScript Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - run: npm test

  rust:
    name: Rust Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-core

      - name: Run tests
        run: cargo test --manifest-path rust-core/Cargo.toml --all-features

      - name: Build (default features)
        run: cargo build --manifest-path rust-core/Cargo.toml --release --bin serverless-db-core

      - name: Build (s3 feature)
        run: cargo build --manifest-path rust-core/Cargo.toml --release --features s3 --bin serverless-db-core

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [typescript, rust]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: serverless-db-core:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
